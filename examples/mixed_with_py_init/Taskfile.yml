version: '3'

tasks:
  stub-gen:
    cmds:
      - cargo run --bin stub_gen
    sources:
      - src/**/*.rs
      - Cargo.toml
    generates:
      - python/**/*.pyi

  test:
    deps: [stub-gen]
    cmds:
      # This currently fails due to __init__.py and __init__.pyi coexistence problem
      # See: https://github.com/Jij-Inc/pyo3-stub-gen/pull/416
      - uv run pyright python/test_imports.py
      - uvx ruff check
