# https://taskfile.dev
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

includes:
  doc:
    taskfile: ../doc.yml
    flatten: true
    dir: .

tasks:
  stub-gen:
    desc: Generate stub file
    cmds:
      - cargo run --bin stub_gen

  test:
    desc: Run tests
    cmds:
      - uv run pytest
      - uv run pyright
      - uvx ruff check
      - uv run mypy --show-error-codes -p mixed.main_mod
      # stubtest is disabled for this example due to PyO3 nested submodule limitations
      # See README.md for details
      - uv run pyrefly check --ignore-missing-imports .
      - uv run ty check .
